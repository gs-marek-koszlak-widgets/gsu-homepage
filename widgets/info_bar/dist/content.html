<style>
  .gsu-info {
    --gsu-info-bg: #22649F;
    --gsu-info-text: #FFFFFF;
    font-family: 'Montserrat', sans-serif;
    background: var(--gsu-info-bg); width: 100%; min-height: 69px;
    display: flex; align-items: center; justify-content: center; padding: 14px 0;
  }
  .gsu-info * { box-sizing: border-box; font-family: inherit !important; }
  .gsu-info__inner {
    display: flex; align-items: center; justify-content: center;
    flex-wrap: wrap; gap: 12px 16px; padding: 0 20px;
    max-width: 1700px; width: 100%;
  }
  .gsu-info__icon { width: 24px; height: 24px; object-fit: contain; border: 0; display: block; }
  .gsu-info__text {
    font-weight: 500; font-size: 15px; line-height: 1; color: var(--gsu-info-text);
  }
  .gsu-info__btn {
    display: inline-block; font-weight: 500; font-size: 14px; line-height: 1;
    color: var(--gsu-info-text); text-decoration: none;
    border: 1.5px solid rgba(255, 255, 255, 0.7); border-radius: 71px;
    padding: 10px 22px; margin-left: 4px;
    transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  }
  .gsu-info__btn:hover { background: var(--gsu-info-text); color: var(--gsu-info-bg); border-color: var(--gsu-info-text); }
  @media screen and (max-width: 768px) {
    .gsu-info__inner { flex-direction: column; text-align: center; gap: 10px; }
  }
</style>
<div class="gsu-info" data-root>
  <div class="gsu-info__inner">
    <img class="gsu-info__icon" data-icon alt="" />
    <span class="gsu-info__text" data-text></span>
    <a class="gsu-info__btn" data-btn href="#"><span data-btn-text></span></a>
  </div>
</div>
<script type="module" src="app.js"></script>
