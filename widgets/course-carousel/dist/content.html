<style>
  :host, .gsu-carousel {
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .gsu-carousel {
    background: #FFFFFF;
    padding: clamp(48px, 6vw, 80px) clamp(20px, 5vw, 64px);
    color: #153D5E;
  }

  .gsu-carousel__header {
    max-width: 1200px;
    margin: 0 auto 28px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .gsu-carousel__heading { flex: 1 1 auto; min-width: 0; }
  .gsu-carousel__title {
    margin: 0 0 6px;
    font-size: clamp(1.5rem, 3vw, 2.25rem);
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .gsu-carousel__subtitle {
    margin: 0;
    font-size: 1rem;
    color: rgba(21, 61, 94, 0.72);
    line-height: 1.5;
  }

  .gsu-carousel__controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .gsu-carousel__view-all {
    font-size: 0.875rem;
    font-weight: 600;
    color: #22649F;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 999px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .gsu-carousel__view-all:hover {
    background: rgba(56, 162, 255, 0.1);
    color: #38A2FF;
  }

  .gsu-carousel__nav {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid rgba(21, 61, 94, 0.18);
    background: #FFFFFF;
    color: #153D5E;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .gsu-carousel__nav:hover:not(:disabled) {
    background: #153D5E;
    color: #FFFFFF;
    border-color: #153D5E;
  }
  .gsu-carousel__nav:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .gsu-carousel__nav:focus-visible {
    outline: 2px solid #38A2FF;
    outline-offset: 2px;
  }

  .gsu-carousel__viewport {
    max-width: 1200px;
    margin: 0 auto;
    overflow: hidden;
  }
  .gsu-carousel__track {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    padding-bottom: 8px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .gsu-carousel__track::-webkit-scrollbar { display: none; }

  .gsu-course {
    flex: 0 0 clamp(260px, 30%, 320px);
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(21, 61, 94, 0.1);
    background: #FFFFFF;
    text-decoration: none;
    color: inherit;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  }
  .gsu-course:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 24px rgba(21, 61, 94, 0.1);
    border-color: rgba(56, 162, 255, 0.35);
  }
  .gsu-course:focus-visible {
    outline: 2px solid #38A2FF;
    outline-offset: 2px;
  }

  .gsu-course__media {
    aspect-ratio: 16 / 9;
    background: linear-gradient(135deg, #153D5E 0%, #22649F 100%);
    position: relative;
  }
  .gsu-course__media img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .gsu-course__badge {
    position: absolute;
    top: 12px;
    left: 12px;
    font-size: 0.6875rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #FFFFFF;
    background: #EB5757;
    padding: 4px 10px;
    border-radius: 999px;
  }

  .gsu-course__body {
    padding: 18px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1 1 auto;
  }
  .gsu-course__title {
    margin: 0;
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.35;
    color: #153D5E;
  }
  .gsu-course__desc {
    margin: 0;
    font-size: 0.875rem;
    line-height: 1.5;
    color: rgba(21, 61, 94, 0.7);
    flex: 1 1 auto;
  }
  .gsu-course__meta {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #22649F;
    margin-top: 4px;
  }
</style>

<section class="gsu-carousel">
  <div class="gsu-carousel__header">
    <div class="gsu-carousel__heading">
      <h2 class="gsu-carousel__title">{{ section_title }}</h2>
      <p class="gsu-carousel__subtitle" data-subtitle>{{ section_subtitle }}</p>
    </div>
    <div class="gsu-carousel__controls">
      <a class="gsu-carousel__view-all" data-view-all href="#">View all</a>
      <button class="gsu-carousel__nav" data-prev aria-label="Previous">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="gsu-carousel__nav" data-next aria-label="Next">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <div class="gsu-carousel__viewport">
    <div class="gsu-carousel__track" data-track></div>
  </div>
</section>

<script>
  (function () {
    const props = (typeof sdk !== 'undefined' && sdk.getProps) ? sdk.getProps() : {};
    const track = sdk.$('[data-track]');
    if (!track) return;

    const subtitle = sdk.$('[data-subtitle]');
    if (!props.section_subtitle || !String(props.section_subtitle).trim()) subtitle.remove();

    const viewAll = sdk.$('[data-view-all]');
    const viewAllUrl = (props.view_all_url || '').trim();
    if (viewAllUrl) {
      viewAll.href = viewAllUrl;
      viewAll.textContent = (props.view_all_label || 'View all').trim();
    } else {
      viewAll.remove();
    }

    let items = [];
    try { items = JSON.parse(props.items_json || '[]'); } catch (e) { items = []; }

    if (!Array.isArray(items) || items.length === 0) {
      track.innerHTML = '<p style="color:rgba(21,61,94,0.6);padding:24px;">No courses configured.</p>';
      return;
    }

    items.forEach(function (it) {
      const el = document.createElement(it.link_url ? 'a' : 'article');
      el.className = 'gsu-course';
      if (it.link_url) { el.href = it.link_url; el.rel = 'noopener'; }

      const media = document.createElement('div');
      media.className = 'gsu-course__media';
      if (it.image_url) {
        const img = document.createElement('img');
        img.src = it.image_url;
        img.alt = '';
        img.loading = 'lazy';
        media.appendChild(img);
      }
      if (it.badge) {
        const b = document.createElement('span');
        b.className = 'gsu-course__badge';
        b.textContent = it.badge;
        media.appendChild(b);
      }
      el.appendChild(media);

      const body = document.createElement('div');
      body.className = 'gsu-course__body';
      const h = document.createElement('h3');
      h.className = 'gsu-course__title';
      h.textContent = it.title || '';
      body.appendChild(h);
      if (it.description) {
        const p = document.createElement('p');
        p.className = 'gsu-course__desc';
        p.textContent = it.description;
        body.appendChild(p);
      }
      if (it.duration) {
        const m = document.createElement('span');
        m.className = 'gsu-course__meta';
        m.textContent = it.duration;
        body.appendChild(m);
      }
      el.appendChild(body);
      track.appendChild(el);
    });

    const prev = sdk.$('[data-prev]');
    const next = sdk.$('[data-next]');

    function scrollBy(dir) {
      const card = track.querySelector('.gsu-course');
      const step = card ? card.getBoundingClientRect().width + 20 : 300;
      track.scrollBy({ left: dir * step, behavior: 'smooth' });
    }
    function updateButtons() {
      const max = track.scrollWidth - track.clientWidth - 1;
      prev.disabled = track.scrollLeft <= 0;
      next.disabled = track.scrollLeft >= max;
    }
    prev.addEventListener('click', function () { scrollBy(-1); });
    next.addEventListener('click', function () { scrollBy(1); });
    track.addEventListener('scroll', updateButtons, { passive: true });
    window.addEventListener('resize', updateButtons);
    updateButtons();
  })();
</script>
