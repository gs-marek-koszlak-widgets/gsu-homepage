<style>
  :host, .gsu-hero {
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .gsu-hero {
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, #153D5E 0%, #0E2F49 100%);
    color: #FFFFFF;
    padding: clamp(48px, 8vw, 96px) clamp(24px, 6vw, 80px);
    display: flex;
    align-items: center;
    min-height: 320px;
    border-radius: 0;
  }

  .gsu-hero__content {
    position: relative;
    z-index: 2;
    max-width: 760px;
  }

  .gsu-hero__eyebrow {
    display: inline-block;
    font-size: 0.8125rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #38A2FF;
    margin-bottom: 16px;
  }

  .gsu-hero__title {
    margin: 0 0 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: #FFFFFF;
  }
  .gsu-hero__accent {
    background: linear-gradient(90deg, #38A2FF 0%, #7FD3FF 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    white-space: nowrap;
  }

  .gsu-hero__subtitle {
    margin: 0;
    font-size: clamp(1rem, 1.6vw, 1.125rem);
    line-height: 1.55;
    color: rgba(255, 255, 255, 0.85);
    max-width: 620px;
  }

  .gsu-hero__decoration {
    position: absolute;
    right: -40px;
    top: 50%;
    transform: translateY(-50%);
    width: clamp(280px, 40%, 520px);
    opacity: 0.85;
    pointer-events: none;
    z-index: 1;
  }
  .gsu-hero__decoration img {
    width: 100%;
    height: auto;
    display: block;
  }

  .gsu-hero::after {
    content: '';
    position: absolute;
    width: 520px;
    height: 520px;
    right: -180px;
    bottom: -260px;
    background: radial-gradient(circle, rgba(56, 162, 255, 0.18) 0%, rgba(56, 162, 255, 0) 70%);
    border-radius: 50%;
    z-index: 0;
  }

  @media (max-width: 720px) {
    .gsu-hero__decoration { display: none; }
    .gsu-hero { padding: 48px 24px; }
  }
</style>

<section class="gsu-hero" data-hero>
  <div class="gsu-hero__content">
    <span class="gsu-hero__eyebrow" data-eyebrow>{{ eyebrow }}</span>
    <h1 class="gsu-hero__title" data-title></h1>
    <p class="gsu-hero__subtitle" data-subtitle>{{ subtitle }}</p>
  </div>
  <div class="gsu-hero__decoration" data-decoration></div>
</section>

<script>
  (function () {
    const props = (typeof sdk !== 'undefined' && sdk.getProps) ? sdk.getProps() : {};
    const hero = sdk.$('[data-hero]');
    if (!hero) return;

    const minHeight = parseInt(props.min_height, 10);
    if (!isNaN(minHeight) && minHeight > 0) {
      hero.style.minHeight = minHeight + 'px';
    }

    const eyebrowEl = sdk.$('[data-eyebrow]');
    if (!props.eyebrow || !String(props.eyebrow).trim()) eyebrowEl.remove();

    const subtitleEl = sdk.$('[data-subtitle]');
    if (!props.subtitle || !String(props.subtitle).trim()) subtitleEl.remove();

    // Title with optional gradient-accent word
    const title = String(props.title || '').trim();
    const accent = String(props.title_accent || '').trim();
    const titleEl = sdk.$('[data-title]');
    if (accent && title.includes(accent)) {
      const idx = title.lastIndexOf(accent);
      const before = title.slice(0, idx);
      const after = title.slice(idx + accent.length);
      titleEl.textContent = '';
      if (before) titleEl.appendChild(document.createTextNode(before));
      const span = document.createElement('span');
      span.className = 'gsu-hero__accent';
      span.textContent = accent;
      titleEl.appendChild(span);
      if (after) titleEl.appendChild(document.createTextNode(after));
    } else {
      titleEl.textContent = title;
    }

    const deco = sdk.$('[data-decoration]');
    const decoUrl = (props.decoration_url || '').trim();
    if (decoUrl) {
      const img = document.createElement('img');
      img.src = decoUrl;
      img.alt = '';
      deco.appendChild(img);
    } else {
      deco.remove();
    }
  })();
</script>
