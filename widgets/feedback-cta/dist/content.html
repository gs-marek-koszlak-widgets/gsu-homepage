<style>
  :host, .gsu-feedback {
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .gsu-feedback {
    position: relative;
    overflow: hidden;
    background: #153D5E;
    color: #FFFFFF;
    padding: clamp(40px, 6vw, 64px) clamp(24px, 6vw, 80px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 32px;
    flex-wrap: wrap;
  }

  .gsu-feedback::before {
    content: '';
    position: absolute;
    width: 360px;
    height: 360px;
    right: -120px;
    top: -160px;
    background: radial-gradient(circle, rgba(56, 162, 255, 0.22) 0%, rgba(56, 162, 255, 0) 70%);
    border-radius: 50%;
  }

  .gsu-feedback__content {
    position: relative;
    z-index: 1;
    flex: 1 1 420px;
    min-width: 0;
  }
  .gsu-feedback__title {
    margin: 0 0 8px;
    font-size: clamp(1.375rem, 2.6vw, 1.875rem);
    font-weight: 700;
    letter-spacing: -0.01em;
    color: #FFFFFF;
  }
  .gsu-feedback__desc {
    margin: 0;
    font-size: 1rem;
    line-height: 1.55;
    color: rgba(255, 255, 255, 0.82);
    max-width: 620px;
  }

  .gsu-feedback__cta {
    position: relative;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    border-radius: 999px;
    background: #38A2FF;
    color: #FFFFFF;
    text-decoration: none;
    font-size: 1rem;
    font-weight: 600;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }
  .gsu-feedback__cta:hover {
    background: #22649F;
    transform: translateY(-1px);
    box-shadow: 0 10px 22px rgba(0, 0, 0, 0.25);
  }
  .gsu-feedback__cta:focus-visible {
    outline: 2px solid #FFFFFF;
    outline-offset: 3px;
  }
</style>

<section class="gsu-feedback">
  <div class="gsu-feedback__content">
    <h2 class="gsu-feedback__title">{{ title }}</h2>
    <p class="gsu-feedback__desc" data-desc>{{ description }}</p>
  </div>
  <a class="gsu-feedback__cta" data-cta href="#" rel="noopener">
    <span data-cta-label></span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M5 12h14M13 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
</section>

<script>
  (function () {
    const props = (typeof sdk !== 'undefined' && sdk.getProps) ? sdk.getProps() : {};

    const desc = sdk.$('[data-desc]');
    if (!props.description || !String(props.description).trim()) desc.remove();

    const cta = sdk.$('[data-cta]');
    const label = (props.cta_label || '').trim();
    const url = (props.cta_url || '').trim();
    if (!label || !url) {
      cta.remove();
      return;
    }
    cta.href = url;
    sdk.$('[data-cta-label]').textContent = label;
    if (props.cta_new_tab) cta.target = '_blank';
  })();
</script>
