<style>
  :host, .gsu-pair {
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .gsu-pair {
    background: #FFFFFF;
    padding: clamp(48px, 6vw, 80px) clamp(20px, 5vw, 64px);
    color: #153D5E;
  }

  .gsu-pair__header {
    max-width: 720px;
    margin: 0 auto 40px;
    text-align: center;
  }
  .gsu-pair__title {
    margin: 0 0 12px;
    font-size: clamp(1.5rem, 3vw, 2.25rem);
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .gsu-pair__subtitle {
    margin: 0;
    font-size: 1rem;
    line-height: 1.55;
    color: rgba(21, 61, 94, 0.72);
  }

  .gsu-pair__grid {
    display: grid;
    gap: 24px;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    max-width: 1100px;
    margin: 0 auto;
  }

  .gsu-infocard {
    background: #FFFFFF;
    border: 2px solid #38A2FF;
    border-radius: 20px;
    padding: clamp(28px, 4vw, 40px);
    display: flex;
    flex-direction: column;
    gap: 20px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .gsu-infocard:hover {
    transform: translateY(-3px);
    box-shadow: 0 14px 30px rgba(56, 162, 255, 0.18);
  }

  .gsu-infocard__icon {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: rgba(56, 162, 255, 0.12);
    display: grid;
    place-items: center;
  }
  .gsu-infocard__icon img {
    width: 40px;
    height: 40px;
    object-fit: contain;
  }
  .gsu-infocard__icon svg { width: 36px; height: 36px; color: #22649F; }

  .gsu-infocard__title {
    margin: 0;
    font-size: 1.375rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: #153D5E;
  }
  .gsu-infocard__desc {
    margin: 0;
    font-size: 1rem;
    line-height: 1.55;
    color: rgba(21, 61, 94, 0.75);
    flex: 1 1 auto;
  }

  .gsu-infocard__cta {
    align-self: flex-start;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 22px;
    border-radius: 999px;
    background: #38A2FF;
    color: #FFFFFF;
    text-decoration: none;
    font-size: 0.9375rem;
    font-weight: 600;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }
  .gsu-infocard__cta:hover {
    background: #22649F;
    transform: translateY(-1px);
    box-shadow: 0 8px 18px rgba(34, 100, 159, 0.25);
  }
  .gsu-infocard__cta:focus-visible {
    outline: 2px solid #153D5E;
    outline-offset: 2px;
  }
</style>

<section class="gsu-pair">
  <div class="gsu-pair__header">
    <h2 class="gsu-pair__title">{{ section_title }}</h2>
    <p class="gsu-pair__subtitle" data-subtitle>{{ section_subtitle }}</p>
  </div>
  <div class="gsu-pair__grid">
    <article class="gsu-infocard" data-card="a">
      <div class="gsu-infocard__icon" data-icon-a>
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 7l9-4 9 4-9 4-9-4zm0 6l9 4 9-4M3 17l9 4 9-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h3 class="gsu-infocard__title">{{ card_a_title }}</h3>
      <p class="gsu-infocard__desc">{{ card_a_description }}</p>
      <a class="gsu-infocard__cta" data-cta-a href="#" rel="noopener">
        <span data-cta-a-label></span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
    </article>

    <article class="gsu-infocard" data-card="b">
      <div class="gsu-infocard__icon" data-icon-b>
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 15a5 5 0 100-10 5 5 0 000 10zm-3 1l-2 6 5-3 5 3-2-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h3 class="gsu-infocard__title">{{ card_b_title }}</h3>
      <p class="gsu-infocard__desc">{{ card_b_description }}</p>
      <a class="gsu-infocard__cta" data-cta-b href="#" rel="noopener">
        <span data-cta-b-label></span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
    </article>
  </div>
</section>

<script>
  (function () {
    const props = (typeof sdk !== 'undefined' && sdk.getProps) ? sdk.getProps() : {};

    const subtitle = sdk.$('[data-subtitle]');
    if (!props.section_subtitle || !String(props.section_subtitle).trim()) subtitle.remove();

    function applyCard(key) {
      const iconSlot = sdk.$('[data-icon-' + key + ']');
      const iconUrl = (props['card_' + key + '_icon_url'] || '').trim();
      if (iconUrl) {
        iconSlot.innerHTML = '';
        const img = document.createElement('img');
        img.src = iconUrl;
        img.alt = '';
        iconSlot.appendChild(img);
      }
      const cta = sdk.$('[data-cta-' + key + ']');
      const label = (props['card_' + key + '_cta_label'] || '').trim();
      const url = (props['card_' + key + '_cta_url'] || '').trim();
      if (label && url && url !== '#') {
        cta.href = url;
        sdk.$('[data-cta-' + key + '-label]').textContent = label;
      } else if (label) {
        sdk.$('[data-cta-' + key + '-label]').textContent = label;
        cta.href = url || '#';
      } else {
        cta.remove();
      }
    }
    applyCard('a');
    applyCard('b');
  })();
</script>
