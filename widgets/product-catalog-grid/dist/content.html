<style>
  :host, .gsu-catalog {
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .gsu-catalog {
    background: linear-gradient(90deg, #FFFFFF 0%, #D4E7FA 100%);
    padding: clamp(48px, 6vw, 80px) clamp(20px, 5vw, 64px);
    color: #153D5E;
  }

  .gsu-catalog__header {
    max-width: 720px;
    margin: 0 auto 40px;
    text-align: center;
  }
  .gsu-catalog__title {
    margin: 0 0 12px;
    font-size: clamp(1.5rem, 3vw, 2.25rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #153D5E;
  }
  .gsu-catalog__subtitle {
    margin: 0;
    font-size: 1rem;
    line-height: 1.55;
    color: rgba(21, 61, 94, 0.75);
  }

  .gsu-catalog__grid {
    display: grid;
    gap: 20px;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    max-width: 1200px;
    margin: 0 auto;
  }

  .gsu-card {
    background: #FFFFFF;
    border-radius: 16px;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(21, 61, 94, 0.06);
    border: 1px solid rgba(21, 61, 94, 0.06);
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    text-decoration: none;
    color: inherit;
  }
  .gsu-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 28px rgba(21, 61, 94, 0.12);
    border-color: rgba(56, 162, 255, 0.4);
  }
  .gsu-card:focus-visible {
    outline: 2px solid #38A2FF;
    outline-offset: 2px;
  }

  .gsu-card__icon {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    background: rgba(56, 162, 255, 0.08);
    display: grid;
    place-items: center;
    overflow: hidden;
  }
  .gsu-card__icon img {
    width: 36px;
    height: 36px;
    object-fit: contain;
  }

  .gsu-card__title {
    margin: 0;
    font-size: 1.125rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: #153D5E;
  }
  .gsu-card__desc {
    margin: 0;
    font-size: 0.9375rem;
    line-height: 1.5;
    color: rgba(21, 61, 94, 0.72);
    flex: 1 1 auto;
  }
  .gsu-card__cta {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.875rem;
    font-weight: 600;
    color: #22649F;
    transition: gap 0.15s ease, color 0.15s ease;
  }
  .gsu-card:hover .gsu-card__cta {
    gap: 10px;
    color: #38A2FF;
  }
</style>

<section class="gsu-catalog">
  <div class="gsu-catalog__header">
    <h2 class="gsu-catalog__title" data-title>{{ section_title }}</h2>
    <p class="gsu-catalog__subtitle" data-subtitle>{{ section_subtitle }}</p>
  </div>
  <div class="gsu-catalog__grid" data-grid></div>
</section>

<script>
  (function () {
    const props = (typeof sdk !== 'undefined' && sdk.getProps) ? sdk.getProps() : {};
    const grid = sdk.$('[data-grid]');
    if (!grid) return;

    let items = [];
    try {
      const raw = props.items_json || '[]';
      items = JSON.parse(raw);
    } catch (e) {
      items = [];
    }

    if (!Array.isArray(items) || items.length === 0) {
      grid.innerHTML = '<p style="text-align:center;color:rgba(21,61,94,0.6);grid-column:1/-1;">No products configured.</p>';
      return;
    }

    const subtitle = sdk.$('[data-subtitle]');
    if (!props.section_subtitle || !String(props.section_subtitle).trim()) subtitle.remove();

    items.forEach(function (it) {
      const el = document.createElement(it.link_url ? 'a' : 'article');
      el.className = 'gsu-card';
      if (it.link_url) {
        el.href = it.link_url;
        el.rel = 'noopener';
      }

      const iconWrap = document.createElement('div');
      iconWrap.className = 'gsu-card__icon';
      if (it.icon_url) {
        const img = document.createElement('img');
        img.src = it.icon_url;
        img.alt = '';
        iconWrap.appendChild(img);
      }
      el.appendChild(iconWrap);

      const h = document.createElement('h3');
      h.className = 'gsu-card__title';
      h.textContent = it.title || '';
      el.appendChild(h);

      if (it.description) {
        const p = document.createElement('p');
        p.className = 'gsu-card__desc';
        p.textContent = it.description;
        el.appendChild(p);
      }

      if (it.link_url && it.link_label) {
        const cta = document.createElement('span');
        cta.className = 'gsu-card__cta';
        cta.innerHTML = '<span></span><svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12h14M13 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        cta.querySelector('span').textContent = it.link_label;
        el.appendChild(cta);
      }

      grid.appendChild(el);
    });
  })();
</script>
