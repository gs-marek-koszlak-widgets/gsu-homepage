<style>
  .gsu-wn {
    --gsu-wn-bg-start: #F3F8FE;
    --gsu-wn-bg-end: #E9F4FF;
    --gsu-wn-accent: #38A2FF;
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(90deg, var(--gsu-wn-bg-start) 0%, var(--gsu-wn-bg-end) 100%);
    width: 100%; padding: 50px 20px 40px 20px;
  }
  .gsu-wn * { box-sizing: border-box; }
  .gsu-wn__wrap { max-width: 1100px; margin: 0 auto; }
  .gsu-wn__header { text-align: center; margin-bottom: 32px; }
  .gsu-wn__title { font-weight: 600; font-size: 32px; line-height: 1.3; color: #0e0e0e; margin-bottom: 10px; }
  .gsu-wn__subtitle { font-weight: 500; font-size: 16px; line-height: 26px; color: #4a4a4a; }
  .gsu-wn__carousel { position: relative; width: 100%; }
  .gsu-wn__arrow {
    display: none; position: absolute; top: 50%; transform: translateY(-70%);
    z-index: 10; cursor: pointer; width: 40px; height: 40px;
    background: #FFFFFF; border: 0; border-radius: 50%;
    box-shadow: 0px 4px 12px rgba(26, 27, 61, 0.15);
    align-items: center; justify-content: center;
    font-family: inherit; font-size: 18px; color: var(--gsu-wn-accent);
    transition: background 0.2s ease, color 0.2s ease;
  }
  .gsu-wn__arrow:hover { background: var(--gsu-wn-accent); color: #FFFFFF; }
  .gsu-wn__arrow--left  { left: -4px; }
  .gsu-wn__arrow--right { right: -4px; }
  .gsu-wn__arrow[data-visible="true"] { display: flex; }
  .gsu-wn__fade {
    display: none; position: absolute; top: 0; width: 60px; height: 100%;
    z-index: 5; pointer-events: none;
  }
  .gsu-wn__fade--left  { left: 0;  background: linear-gradient(270deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 100%); }
  .gsu-wn__fade--right { right: 0; background: linear-gradient(90deg,  rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 100%); }
  .gsu-wn__fade[data-visible="true"] { display: block; }
  .gsu-wn__scroll {
    overflow-x: auto; overflow-y: hidden; white-space: nowrap;
    -webkit-overflow-scrolling: touch; font-size: 0;
    scroll-behavior: smooth; padding: 4px 0;
    scrollbar-width: none; -ms-overflow-style: none;
  }
  .gsu-wn__scroll::-webkit-scrollbar { display: none; }
  .gsu-wn__track { display: inline-block; white-space: nowrap; font-size: 0; }
  .gsu-wn__card {
    display: inline-flex; flex-direction: column; vertical-align: top;
    white-space: normal; width: 280px; min-width: 280px; max-width: 280px;
    height: 380px; margin-right: 20px; font-size: 15px;
    scroll-snap-align: start; overflow: hidden; background: #FFFFFF;
    border-radius: 16px; box-shadow: 0 4px 14px rgba(26,27,61,0.1);
    text-decoration: none; color: inherit;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .gsu-wn__card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(26,27,61,0.15); }
  .gsu-wn__card:last-child { margin-right: 0; }
  .gsu-wn__card[data-hidden="true"] { display: none; }
  .gsu-wn__card-img {
    width: 100%; height: 160px; object-fit: cover; object-position: center;
    border: 0; display: block; background: #eee;
  }
  .gsu-wn__card-body { padding: 16px 18px 18px 18px; display: flex; flex-direction: column; flex: 1; gap: 8px; }
  .gsu-wn__card-title {
    font-weight: 600; font-size: 16px; line-height: 1.3;
    color: #153D5E; overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical; max-height: 2.6em;
  }
  .gsu-wn__card-desc {
    font-weight: 500; font-size: 13px; line-height: 1.4; color: #4a4a4a;
    overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 3; -webkit-box-orient: vertical; max-height: 4.2em;
  }
  .gsu-wn__card-meta {
    margin-top: auto; font-weight: 500; font-size: 12px; color: #22649F;
  }
</style>
<section class="gsu-wn" data-root>
  <div class="gsu-wn__wrap">
    <div class="gsu-wn__header">
      <div class="gsu-wn__title" data-section-title></div>
      <div class="gsu-wn__subtitle" data-section-subtitle></div>
    </div>
    <div class="gsu-wn__carousel">
      <button class="gsu-wn__arrow gsu-wn__arrow--left"  data-arrow="left"  aria-label="Scroll left">&lsaquo;</button>
      <button class="gsu-wn__arrow gsu-wn__arrow--right" data-arrow="right" aria-label="Scroll right">&rsaquo;</button>
      <div class="gsu-wn__fade gsu-wn__fade--left"  data-fade="left"></div>
      <div class="gsu-wn__fade gsu-wn__fade--right" data-fade="right"></div>
      <div class="gsu-wn__scroll" data-scroller>
        <div class="gsu-wn__track">
          <a class="gsu-wn__card" data-card="1" href="#"><img class="gsu-wn__card-img" data-card-img="1" alt="" /><div class="gsu-wn__card-body"><div class="gsu-wn__card-title" data-card-title="1"></div><div class="gsu-wn__card-desc" data-card-desc="1"></div><div class="gsu-wn__card-meta" data-card-meta="1"></div></div></a>
          <a class="gsu-wn__card" data-card="2" href="#"><img class="gsu-wn__card-img" data-card-img="2" alt="" /><div class="gsu-wn__card-body"><div class="gsu-wn__card-title" data-card-title="2"></div><div class="gsu-wn__card-desc" data-card-desc="2"></div><div class="gsu-wn__card-meta" data-card-meta="2"></div></div></a>
          <a class="gsu-wn__card" data-card="3" href="#"><img class="gsu-wn__card-img" data-card-img="3" alt="" /><div class="gsu-wn__card-body"><div class="gsu-wn__card-title" data-card-title="3"></div><div class="gsu-wn__card-desc" data-card-desc="3"></div><div class="gsu-wn__card-meta" data-card-meta="3"></div></div></a>
          <a class="gsu-wn__card" data-card="4" href="#"><img class="gsu-wn__card-img" data-card-img="4" alt="" /><div class="gsu-wn__card-body"><div class="gsu-wn__card-title" data-card-title="4"></div><div class="gsu-wn__card-desc" data-card-desc="4"></div><div class="gsu-wn__card-meta" data-card-meta="4"></div></div></a>
          <a class="gsu-wn__card" data-card="5" href="#"><img class="gsu-wn__card-img" data-card-img="5" alt="" /><div class="gsu-wn__card-body"><div class="gsu-wn__card-title" data-card-title="5"></div><div class="gsu-wn__card-desc" data-card-desc="5"></div><div class="gsu-wn__card-meta" data-card-meta="5"></div></div></a>
          <a class="gsu-wn__card" data-card="6" href="#"><img class="gsu-wn__card-img" data-card-img="6" alt="" /><div class="gsu-wn__card-body"><div class="gsu-wn__card-title" data-card-title="6"></div><div class="gsu-wn__card-desc" data-card-desc="6"></div><div class="gsu-wn__card-meta" data-card-meta="6"></div></div></a>
          <a class="gsu-wn__card" data-card="7" href="#"><img class="gsu-wn__card-img" data-card-img="7" alt="" /><div class="gsu-wn__card-body"><div class="gsu-wn__card-title" data-card-title="7"></div><div class="gsu-wn__card-desc" data-card-desc="7"></div><div class="gsu-wn__card-meta" data-card-meta="7"></div></div></a>
          <a class="gsu-wn__card" data-card="8" href="#"><img class="gsu-wn__card-img" data-card-img="8" alt="" /><div class="gsu-wn__card-body"><div class="gsu-wn__card-title" data-card-title="8"></div><div class="gsu-wn__card-desc" data-card-desc="8"></div><div class="gsu-wn__card-meta" data-card-meta="8"></div></div></a>
        </div>
      </div>
    </div>
  </div>
</section>
<script type="module" src="app.js"></script>
