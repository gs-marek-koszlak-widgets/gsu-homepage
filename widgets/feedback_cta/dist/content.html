<style>
  .gsu-fb {
    --gsu-fb-bg: #153D5E;
    --gsu-fb-text: #E9F4FF;
    --gsu-fb-btn: #38A2FF;
    --gsu-fb-btn-text: #FFFFFF;
    font-family: 'Montserrat', sans-serif;
    background: var(--gsu-fb-bg);
    width: 100%; padding: 60px 20px; text-align: center;
    position: relative; overflow: hidden;
  }
  .gsu-fb * { box-sizing: border-box; }
  .gsu-fb__deco {
    position: absolute; width: 440px; height: 440px;
    object-fit: contain; border: 0; z-index: 0;
    pointer-events: none;
  }
  .gsu-fb__deco[data-hidden="true"] { display: none; }
  .gsu-fb__deco--right {
    top: 50%; right: -40px; transform: translateY(-50%);
  }
  .gsu-fb__deco--left {
    bottom: -120px; left: -40px; transform: rotate(180deg);
  }
  .gsu-fb__wrap { max-width: 800px; margin: 0 auto; position: relative; z-index: 1; }
  .gsu-fb__title {
    font-weight: 600; font-size: 30px; line-height: 140%;
    color: var(--gsu-fb-text); margin-bottom: 8px;
  }
  .gsu-fb__subtitle {
    font-weight: 500; font-size: 19px; line-height: 29px;
    color: var(--gsu-fb-text); margin-bottom: 28px;
  }
  .gsu-fb__btn {
    display: inline-block; font-weight: 500; font-size: 15px; line-height: 100%;
    color: var(--gsu-fb-btn-text); background: var(--gsu-fb-btn);
    text-decoration: none; padding: 16px 30px; border-radius: 71px;
    transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
  }
  .gsu-fb__btn:hover {
    transform: scale(1.03);
    box-shadow: 0px 4px 12px rgba(56, 162, 255, 0.25);
    filter: brightness(0.95);
  }
</style>
<section class="gsu-fb" data-root>
  <img class="gsu-fb__deco gsu-fb__deco--right" data-deco="right" alt="" />
  <img class="gsu-fb__deco gsu-fb__deco--left"  data-deco="left"  alt="" />
  <div class="gsu-fb__wrap">
    <div class="gsu-fb__title" data-title></div>
    <div class="gsu-fb__subtitle" data-subtitle></div>
    <a class="gsu-fb__btn" data-btn href="#"><span data-btn-text></span> &nbsp;&rsaquo;</a>
  </div>
</section>
<script type="module" src="app.js"></script>
