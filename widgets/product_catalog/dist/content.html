<style>
  .gsu-pc {
    --gsu-pc-bg-start: #F3F8FE;
    --gsu-pc-bg-end: #E9F4FF;
    --gsu-pc-card-title: #153D5E;
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(90deg, var(--gsu-pc-bg-start) 0%, var(--gsu-pc-bg-end) 100%);
    width: 100%; padding: 60px 20px;
  }
  .gsu-pc * { box-sizing: border-box; }
  .gsu-pc__wrap { text-align: center; max-width: 1100px; margin: 0 auto; }
  .gsu-pc__title {
    font-weight: 600; font-size: 32px; line-height: 1.3;
    color: #0e0e0e; margin-bottom: 12px;
  }
  .gsu-pc__subtitle {
    font-weight: 500; font-size: 16px; line-height: 26px;
    color: #4a4a4a; margin-bottom: 40px;
  }
  .gsu-pc__grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    grid-auto-rows: 1fr; gap: 20px;
    max-width: 1100px; margin: 0 auto;
  }
  .gsu-pc__card {
    display: flex; flex-direction: column; background: #FFFFFF;
    border-radius: 20px; padding: 28px 24px; text-decoration: none;
    box-shadow: 0px 8.82px 17.64px rgba(26, 27, 61, 0.1);
    text-align: left; color: inherit;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .gsu-pc__card[data-hidden="true"] { display: none; }
  .gsu-pc__card:hover {
    transform: translateY(-4px);
    box-shadow: 0px 14px 28px rgba(26, 27, 61, 0.16);
  }
  .gsu-pc__card-head {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .gsu-pc__card-icon { width: 32px; height: 32px; object-fit: contain; border: 0; display: block; }
  .gsu-pc__card-icon[data-hidden="true"] { display: none; }
  .gsu-pc__card-title {
    font-weight: 600; font-size: 18px;
    color: var(--gsu-pc-card-title);
  }
  .gsu-pc__card-desc {
    flex-grow: 1; font-weight: 500; font-size: 14px; line-height: 22px;
    color: #0e0e0e;
  }
  @media screen and (max-width: 1200px) {
    .gsu-pc__grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media screen and (max-width: 560px) {
    .gsu-pc__grid { grid-template-columns: 1fr; max-width: 400px; }
  }
</style>
<section class="gsu-pc" data-root>
  <div class="gsu-pc__wrap">
    <div class="gsu-pc__title" data-section-title></div>
    <div class="gsu-pc__subtitle" data-section-subtitle></div>
    <div class="gsu-pc__grid">
      <a class="gsu-pc__card" data-card="1" href="#">
        <div class="gsu-pc__card-head">
          <img class="gsu-pc__card-icon" data-card-icon="1" alt="" />
          <span class="gsu-pc__card-title" data-card-title="1"></span>
        </div>
        <div class="gsu-pc__card-desc" data-card-desc="1"></div>
      </a>
      <a class="gsu-pc__card" data-card="2" href="#">
        <div class="gsu-pc__card-head">
          <img class="gsu-pc__card-icon" data-card-icon="2" alt="" />

        </div>
        <div class="gsu-pc__card-desc" data-card-desc="2"></div>
      </a>
      <a class="gsu-pc__card" data-card="3" href="#">

          <img class="gsu-pc__card-icon" data-card-icon="3" alt="" />
          <span class="gsu-pc__card-title" data-card-title="3"></span>
        </div>
        <div class="gsu-pc__card-desc" data-card-desc="3"></div>
      </a>
      <a class="gsu-pc__card" data-card="4" href="#">
        <div class="gsu-pc__card-head">
          <img class="gsu-pc__card-icon" data-card-icon="4" alt="" />
          <span class="gsu-pc__card-title" data-card-title="4"></span>
        </div>
        <div class="gsu-pc__card-desc" data-card-desc="4"></div>
      </a>
      <a class="gsu-pc__card" data-card="5" href="#">
        <div class="gsu-pc__card-head">
          <img class="gsu-pc__card-icon" data-card-icon="5" alt="" />
          <span class="gsu-pc__card-title" data-card-title="5"></span>
        </div>
        <div class="gsu-pc__card-desc" data-card-desc="5"></div>

      </a>
    </div>
  </div>
</section>
<script type="module" src="app.js"></script>
