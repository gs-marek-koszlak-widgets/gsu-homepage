<style>
  .gsu-pg {
    --gsu-pg-bg: #FFFFFF;
    --gsu-pg-tile-title: #153D5E;
    font-family: 'Montserrat', sans-serif;
    background: var(--gsu-pg-bg);
    width: 100%; padding: 60px 20px;
    border-top: 2px solid #E0E8EF;
    position: relative; overflow: hidden;
  }
  .gsu-pg * { box-sizing: border-box; }
  .gsu-pg__wrap { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
  .gsu-pg__header { text-align: center; margin-bottom: 40px; }
  .gsu-pg__title {
    font-weight: 600; font-size: 32px; line-height: 1.3;
    color: #0e0e0e; margin-bottom: 12px;
  }
  .gsu-pg__subtitle {
    font-weight: 500; font-size: 16px; line-height: 26px; color: #4a4a4a;
  }
  .gsu-pg__grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
  }
  .gsu-pg__tile {
    display: flex; align-items: center; gap: 14px;
    background: #FFFFFF; border-radius: 16px; padding: 20px;
    min-height: 80px; box-shadow: 0 4px 14px rgba(26,27,61,0.06);
    text-decoration: none; color: inherit;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .gsu-pg__tile:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(26,27,61,0.12);
  }
  .gsu-pg__tile[data-hidden="true"] { display: none; }
  .gsu-pg__icon-wrap {
    width: 36px; height: 36px; min-width: 36px; border-radius: 50%;
    background: rgba(56,162,255,0.1);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .gsu-pg__icon { width: 28px; height: 28px; object-fit: contain; border: 0; display: block; }
  .gsu-pg__icon[data-hidden="true"] { visibility: hidden; }
  .gsu-pg__tile-title {
    font-weight: 600; font-size: 14px; line-height: 1.4;
    color: var(--gsu-pg-tile-title);
  }
  @media screen and (max-width: 1200px) {
    .gsu-pg__grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media screen and (max-width: 768px) {
    .gsu-pg__grid { grid-template-columns: 1fr; }
  }
</style>
