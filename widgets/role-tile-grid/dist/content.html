<style>
  :host, .gsu-roles {
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .gsu-roles {
    background: #FFFFFF;
    padding: clamp(48px, 6vw, 80px) clamp(20px, 5vw, 64px);
    color: #153D5E;
  }

  .gsu-roles__header {
    max-width: 720px;
    margin: 0 auto 40px;
    text-align: center;
  }
  .gsu-roles__title {
    margin: 0 0 12px;
    font-size: clamp(1.5rem, 3vw, 2.25rem);
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .gsu-roles__subtitle {
    margin: 0;
    font-size: 1rem;
    line-height: 1.55;
    color: rgba(21, 61, 94, 0.72);
  }

  .gsu-roles__grid {
    display: grid;
    gap: 16px;
    max-width: 1200px;
    margin: 0 auto;
    grid-template-columns: repeat(var(--gsu-cols, 5), minmax(0, 1fr));
  }

  @media (max-width: 1024px) {
    .gsu-roles__grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 640px) {
    .gsu-roles__grid { grid-template-columns: repeat(2, 1fr); }
  }

  .gsu-tile {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
    padding: 20px;
    background: #FFFFFF;
    border: 1px solid rgba(21, 61, 94, 0.12);
    border-radius: 14px;
    text-decoration: none;
    color: inherit;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    position: relative;
    overflow: hidden;
  }
  .gsu-tile:hover {
    transform: translateY(-2px);
    border-color: #38A2FF;
    box-shadow: 0 8px 20px rgba(21, 61, 94, 0.1);
  }
  .gsu-tile:focus-visible {
    outline: 2px solid #38A2FF;
    outline-offset: 2px;
  }

  .gsu-tile__group {
    font-size: 0.6875rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #FFFFFF;
    padding: 4px 8px;
    border-radius: 999px;
    background: #22649F;
  }
  .gsu-tile__group[data-group="CS"] { background: #22649F; }
  .gsu-tile__group[data-group="CC"] { background: #38A2FF; }
  .gsu-tile__group[data-group="PX"] { background: #7B61FF; }
  .gsu-tile__group[data-group="SJ"] { background: #1AAE9F; }
  .gsu-tile__group[data-group="ST"] { background: #F2994A; }
  .gsu-tile__group[data-group="CE"] { background: #EB5757; }

  .gsu-tile__title {
    margin: 0;
    font-size: 0.9375rem;
    font-weight: 600;
    line-height: 1.35;
    color: #153D5E;
  }

  .gsu-tile__icon {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 24px;
    height: 24px;
    opacity: 0.35;
    transition: opacity 0.15s ease;
  }
  .gsu-tile:hover .gsu-tile__icon { opacity: 1; }
  .gsu-tile__icon svg { width: 100%; height: 100%; }
</style>

<section class="gsu-roles">
  <div class="gsu-roles__header">
    <h2 class="gsu-roles__title">{{ section_title }}</h2>
    <p class="gsu-roles__subtitle" data-subtitle>{{ section_subtitle }}</p>
  </div>
  <div class="gsu-roles__grid" data-grid></div>
</section>

<script>
  (function () {
    const props = (typeof sdk !== 'undefined' && sdk.getProps) ? sdk.getProps() : {};
    const grid = sdk.$('[data-grid]');
    if (!grid) return;

    const cols = parseInt(props.columns, 10);
    if (!isNaN(cols) && cols > 0) {
      grid.style.setProperty('--gsu-cols', cols);
    }

    const subtitle = sdk.$('[data-subtitle]');
    if (!props.section_subtitle || !String(props.section_subtitle).trim()) subtitle.remove();

    let items = [];
    try { items = JSON.parse(props.items_json || '[]'); } catch (e) { items = []; }

    if (!Array.isArray(items) || items.length === 0) {
      grid.innerHTML = '<p style="text-align:center;color:rgba(21,61,94,0.6);grid-column:1/-1;">No roles configured.</p>';
      return;
    }

    items.forEach(function (it) {
      const el = document.createElement(it.link_url ? 'a' : 'div');
      el.className = 'gsu-tile';
      if (it.link_url) { el.href = it.link_url; el.rel = 'noopener'; }

      if (it.group) {
        const g = document.createElement('span');
        g.className = 'gsu-tile__group';
        g.dataset.group = it.group;
        g.textContent = it.group;
        el.appendChild(g);
      }

      const t = document.createElement('h3');
      t.className = 'gsu-tile__title';
      t.textContent = it.title || '';
      el.appendChild(t);

      const arrow = document.createElement('span');
      arrow.className = 'gsu-tile__icon';
      arrow.innerHTML = '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 17L17 7M17 7H9M17 7v8" stroke="#22649F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      el.appendChild(arrow);

      grid.appendChild(el);
    });
  })();
</script>
