<style>
  :host, .gsu-announcement {
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .gsu-announcement {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 32px;
    width: 100%;
    box-sizing: border-box;
    color: #153D5E;
    font-size: 0.9375rem;
    line-height: 1.45;
  }

  .gsu-announcement[data-variant="warning"] {
    background: #F1E4E6;
    color: #EB5757;
  }
  .gsu-announcement[data-variant="info"] {
    background: #22649F;
    color: #FFFFFF;
  }
  .gsu-announcement[data-variant="neutral"] {
    background: #F3F4F6;
    color: #153D5E;
  }

  .gsu-announcement__icon {
    flex: 0 0 auto;
    width: 28px;
    height: 28px;
    display: grid;
    place-items: center;
  }
  .gsu-announcement__icon img {
    max-width: 100%;
    max-height: 100%;
    display: block;
  }

  .gsu-announcement__body {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    flex-wrap: wrap;
    gap: 4px 12px;
    align-items: baseline;
  }
  .gsu-announcement__title {
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .gsu-announcement__desc {
    opacity: 0.95;
  }

  .gsu-announcement__cta {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 0.875rem;
    text-decoration: none;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    background: #FFFFFF;
    color: #153D5E;
    border: 1px solid currentColor;
  }
  .gsu-announcement[data-variant="info"] .gsu-announcement__cta {
    background: #FFFFFF;
    color: #22649F;
    border-color: transparent;
  }
  .gsu-announcement[data-variant="warning"] .gsu-announcement__cta {
    background: #EB5757;
    color: #FFFFFF;
    border-color: transparent;
  }
  .gsu-announcement__cta:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(21, 61, 94, 0.15);
  }
  .gsu-announcement__cta:focus {
    outline: 2px solid currentColor;
    outline-offset: 2px;
  }

  @media (max-width: 640px) {
    .gsu-announcement {
      padding: 12px 16px;
      gap: 12px;
      font-size: 0.875rem;
    }
    .gsu-announcement__icon {
      width: 22px;
      height: 22px;
    }
  }
</style>

<div class="gsu-announcement" data-variant="{{ variant }}" role="status">
  <div class="gsu-announcement__icon" data-icon></div>
  <div class="gsu-announcement__body">
    <span class="gsu-announcement__title">{{ title }}</span>
    <span class="gsu-announcement__desc">{{ description }}</span>
  </div>
  <a class="gsu-announcement__cta" data-cta href="#" rel="noopener">
    <span data-cta-label></span>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M5 12h14M13 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
</div>

<script>
  (function () {
    const props = (typeof sdk !== 'undefined' && sdk.getProps) ? sdk.getProps() : {};
    const root = sdk.$('.gsu-announcement');
    if (!root) return;

    const iconSlot = sdk.$('[data-icon]');
    const iconUrl = (props.icon_url || '').trim();
    if (iconUrl) {
      const img = document.createElement('img');
      img.src = iconUrl;
      img.alt = '';
      iconSlot.appendChild(img);
    } else {
      iconSlot.remove();
    }

    const cta = sdk.$('[data-cta]');
    const label = (props.cta_label || '').trim();
    const url = (props.cta_url || '').trim();
    if (label && url) {
      cta.href = url;
      sdk.$('[data-cta-label]').textContent = label;
      if (props.cta_new_tab) {
        cta.target = '_blank';
      }
    } else {
      cta.remove();
    }
  })();
</script>
